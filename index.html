<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Made in M</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: black;
      color: #f5f5f5;
    }

    video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .hero {
      height: 100vh;
      position: relative;
    }

    .content {
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 90%;
      max-width: 900px;
    }

    h1 {
      font-size: 5.5rem;
      letter-spacing: 4px;
      font-weight: 700;
      color: #e8d8a0;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    p {
      margin-top: 10px;
      font-size: 1rem;
      opacity: 0.75;
      letter-spacing: 2px;
    }

    .buttons {
      margin-top: 40px;
    }

    .button-link {
      text-decoration: none;
      color: #f5f5f5;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 8px 18px;
      margin: 0 8px;
      display: inline-block;
      letter-spacing: 2px;
      font-size: 0.9rem;
      opacity: 0.85;
      transition: 0.3s;
    }

    .button-link:hover {
      background: rgba(255,255,255,0.1);
      color: #e8d8a0;
      border-color: #e8d8a0;
    }

    /* SPOTIFY */
    .spotify {
      padding: 100px 20px;
      text-align: center;
      background: rgba(0,0,0,0.9);
    }

    .spotify h2 {
      margin-bottom: 30px;
      letter-spacing: 3px;
      color: #e8d8a0;
    }

    iframe {
      border-radius: 12px;
      width: 100%;
      max-width: 800px;
      height: 380px;
    }

    /* FEATURED */
    .featured {
      padding: 100px 20px;
      text-align: center;
      background: black;
    }

    .featured h2 {
      margin-bottom: 40px;
      letter-spacing: 3px;
      color: #e8d8a0;
    }

    .tracks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .track {
      padding: 30px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
      transition: 0.3s;
    }

    .track:hover {
      border-color: #e8d8a0;
      transform: translateY(-3px);
    }

    .track h3 {
      color: #e8d8a0;
      font-size: 1.6rem;
      margin-bottom: 10px;
    }

    .track a {
      color: #f5f5f5;
      text-decoration: none;
      letter-spacing: 2px;
      font-size: 0.9rem;
      opacity: 0.8;
      border-bottom: 1px solid rgba(255,255,255,0.3);
    }

    .track a:hover {
      color: #e8d8a0;
      border-color: #e8d8a0;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 3.5rem;
      }
    }
  </style>
</head>

<body>

  <video autoplay muted loop playsinline>
    <source src="hero.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- HERO -->
  <section class="hero">
    <div class="content">
      <h1>MADE IN M</h1>
      <p>beats</p>

      <div class="buttons">
        <a class="button-link" href="#spotify">LISTEN →</a>
        <a class="button-link" href="https://made-in-m-digitalluc.sellfy.store/p/drum-essentials/" target="_blank">DRUMKIT →</a>
      </div>
    </div>
  </section>

  <!-- SPOTIFY -->
  <section class="spotify" id="spotify">
    <h2>THIS IS MADE IN M</h2>

    <iframe src="https://open.spotify.com/embed/playlist/37i9dQZF1DZ06evO3d1tc3?utm_source=generator"
      frameBorder="0"
      allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
    </iframe>
  </section>

  <!-- FEATURED -->
  <section class="featured">
    <h2>FEATURED</h2>

    <div class="tracks">
      <div class="track">
        <h3>Snowing</h3>
        <a href="https://open.spotify.com/intl-de/album/4eJsXtiVnMUKUMoapDqOUr?si=uWaGAU-tTleBJ7pX8CsvBw" target="_blank">open →</a>
      </div>

      <div class="track">
        <h3>bifurca</h3>
        <a href="https://madeinm.bandcamp.com/track/bifurca" target="_blank">open →</a>
      </div>
    </div>
  </section>

</body>
</html>
