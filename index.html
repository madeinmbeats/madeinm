<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Made in M</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: black;
      color: #f5f5f5;
    }

    video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    /* HERO */
    .hero {
      height: 100vh;
      position: relative;
    }

    .content {
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    h1 {
      font-size: 5.5rem;
      letter-spacing: 4px;
      font-weight: 700;
      color: #e8d8a0;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    p {
      margin-top: 10px;
      font-size: 1rem;
      opacity: 0.7;
      letter-spacing: 2px;
    }

    .buttons {
      margin-top: 40px;
    }

    a {
      text-decoration: none;
      color: #f5f5f5;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 8px 18px;
      margin: 0 8px;
      display: inline-block;
      letter-spacing: 2px;
      font-size: 0.9rem;
      opacity: 0.8;
      transition: 0.3s;
    }

    a:hover {
      background: rgba(255,255,255,0.1);
      color: #e8d8a0;
      border-color: #e8d8a0;
    }

    /* MUSIC SECTION */
    .music {
      padding: 100px 20px;
      text-align: center;
      background: black;
    }

    .music h2 {
      font-size: 2rem;
      margin-bottom: 40px;
      letter-spacing: 3px;
      color: #e8d8a0;
    }

    .tracks {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      max-width: 900px;
      margin: 0 auto;
    }

    .track {
      background: #111;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }

  </style>
</head>

<body>

  <!-- VIDEO -->
  <video autoplay muted loop playsinline>
    <source src="hero.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <!-- HERO -->
  <section class="hero">
    <div class="content">
      <h1>MADE IN M</h1>
      <p>beats</p>

      <div class="buttons">
        <a href="#">LISTEN →</a>
        <a href="#">DRUMKIT →</a>
      </div>
    </div>
  </section>

  <!-- MUSIC -->
  <section class="music">
    <h2>MUSIC</h2>

    <div class="tracks">
      <div class="track">track 01</div>
      <div class="track">track 02</div>
      <div class="track">track 03</div>
    </div>
  </section>

</body>
</html>
