<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Made in M</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Space Grotesk', Arial, sans-serif;
}

body {
  background: black;
  color: #f5f5f5;
}

/* HERO VIDEO */

video.bg-video {
  position: fixed;
  top: 50%;
  left: 50%;
  min-width: 100%;
  min-height: 100%;
  transform: translate(-50%, -50%);
  object-fit: cover;
  z-index: -3;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: -1;
}

/* HERO */

.hero {
  height: 100vh;
  position: relative;
}

.content {
  position: absolute;
  top: 48%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
}

h1 {
  font-size: 5.5rem;
  letter-spacing: 5px;
  font-weight: 600;
  color: #e8d8a0;
}

/* BUTTONS */

.buttons {
  margin-top: 40px;
}

.button-link {
  display: inline-block;
  padding: 10px 20px;
  margin: 5px;
  border: 1px solid rgba(255,255,255,0.5);
  text-decoration: none;
  color: white;
}

/* SECTIONS */

section {
  padding: 100px 20px;
  text-align: center;
}

h2 {
  color: #e8d8a0;
  letter-spacing: 3px;
  margin-bottom: 40px;
}

/* RELEASES */

.release-grid {
  display: grid;
  grid-template-columns: repeat(2, 180px);
  justify-content: center;
  gap: 30px;
}

.release-cover {
  aspect-ratio: 1;
  border: 1px solid rgba(255,255,255,0.1);
}

.release-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* RECORDS */

.records-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 30px;
  justify-items: center;
  margin-bottom: 30px;
}

.archive-card {
  width: 180px;
}

.archive-cover {
  aspect-ratio: 1;
  border: 1px solid rgba(255,255,255,0.1);
}

.archive-cover img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* VIDEO GRID */

.video-archive-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 30px;
}

.video-frame {
  aspect-ratio: 3/4;
  border: 2px solid rgba(255,255,255,0.4);
}

.video-frame video {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* MOBILE */

@media (max-width: 700px) {

  h1 {
    font-size: 3.2rem;
  }

  .buttons {
    display: flex;
    flex-direction: column;
  }

  .button-link {
    width: 220px;
  }

  /* releases más pequeños */
  .release-grid {
    grid-template-columns: repeat(2, 140px);
    gap: 20px;
  }

  /* discos en 2 columnas */
  .records-row {
    grid-template-columns: repeat(2, 1fr);
  }

  .archive-card {
    width: 150px;
  }

  /* 👉 BONUS: centrar Sumergido */
  .records-row:last-child .archive-card:last-child {
    grid-column: span 2;
    margin: 0 auto;
  }

  /* videos */
  .video-archive-grid {
    grid-template-columns: repeat(2, 1fr);
  }

}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
  <source src="hero.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<section class="hero">
  <div class="content">
    <h1>MADE IN M</h1>

    <div class="buttons">
      <a class="button-link" href="#playlists">LISTEN</a>
      <a class="button-link" href="#records">RECORDS</a>
      <a class="button-link" href="#archive">ARCHIVE</a>
    </div>
  </div>
</section>

<section class="featured">
  <h2>RECENT RELEASES</h2>

  <div class="release-grid">
    <div class="release-cover"><img data-src="snowing.png"></div>
    <div class="release-cover"><img data-src="bifurca.png"></div>
  </div>
</section>

<section class="archive" id="records">
  <h2>RECORDS</h2>

  <div class="records-row">
    <div class="archive-card"><div class="archive-cover"><img data-src="archive-01.png"></div></div>
    <div class="archive-card"><div class="archive-cover"><img data-src="archive-02.png"></div></div>
    <div class="archive-card"><div class="archive-cover"><img data-src="archive-03.png"></div></div>
    <div class="archive-card"><div class="archive-cover"><img data-src="archive-04.png"></div></div>
  </div>

  <div class="records-row">
    <div class="archive-card"><div class="archive-cover"><img data-src="archive-05.png"></div></div>
    <div class="archive-card"><div class="archive-cover"><img data-src="archive-07.png"></div></div>
    <div class="archive-card"><div class="archive-cover"><img data-src="archive-06.png"></div></div>
  </div>

</section>

<section class="video-archive" id="archive">
  <h2>ARCHIVE</h2>

  <div class="video-archive-grid">

    <div class="video-frame">
      <video muted loop autoplay playsinline preload="none">
        <source data-src="album01.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-frame">
      <video muted loop autoplay playsinline preload="none">
        <source data-src="album02.mp4" type="video/mp4">
      </video>
    </div>

    <div class="video-frame">
      <video muted loop autoplay playsinline preload="none">
        <source data-src="album03.mp4" type="video/mp4">
      </video>
    </div>

  </div>
</section>

<script>

function loadImages() {
  document.querySelectorAll("img[data-src]").forEach(img => {
    img.src = img.dataset.src;
  });
}

function loadVideos() {
  document.querySelectorAll("video source[data-src]").forEach(src => {
    src.src = src.dataset.src;
    src.parentElement.load();
  });
}

window.addEventListener("load", () => {
  setTimeout(loadImages, 100);
  setTimeout(loadVideos, 400);
});

</script>

</body>
</html>
