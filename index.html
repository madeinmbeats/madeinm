<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Made in M</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow: hidden;
      background: black;
      color: #f5f5f5;
    }

    video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .content {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    h1 {
      font-size: 5rem;
      letter-spacing: 4px;
      font-weight: 700;
      color: #e8d8a0; /* amarillo desgastado */
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    p {
      margin-top: 10px;
      font-size: 1rem;
      opacity: 0.7;
      letter-spacing: 2px;
      color: #f5f5f5;
    }

    .buttons {
      margin-top: 40px;
    }

    a {
      text-decoration: none;
      color: #f5f5f5;
      border: 1px solid #f5f5f5;
      padding: 10px 25px;
      margin: 0 10px;
      display: inline-block;
      transition: 0.3s;
      letter-spacing: 1px;
    }

    a:hover {
      background: #f5f5f5;
      color: black;
    }
  </style>
</head>

<body>

  <video autoplay muted loop playsinline>
    <source src="hero.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <div class="content">
    <h1>MADE IN M</h1>
    <p>beats</p>

    <div class="buttons">
      <a href="#">LISTEN</a>
      <a href="#">DRUMKIT</a>
    </div>
  </div>

</body>
</html>
