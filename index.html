<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Made in M</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      background: black;
      color: #f5f5f5;
    }

    video.bg-video {
      position: fixed;
      top: 50%;
      left: 50%;
      min-width: 100%;
      min-height: 100%;
      transform: translate(-50%, -50%);
      object-fit: cover;
      z-index: -3;
    }

    video.grain {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.07;
      pointer-events: none;
      z-index: 10;
      mix-blend-mode: screen;
    }

    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: -1;
    }

    .hero {
      height: 100vh;
      position: relative;
    }

    .content {
      position: absolute;
      top: 48%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      width: 90%;
      max-width: 900px;
    }

    h1 {
      font-size: 5.5rem;
      letter-spacing: 4px;
      font-weight: 700;
      color: #e8d8a0;
      text-shadow: 0 0 20px rgba(0,0,0,0.8);
    }

    p {
      margin-top: 10px;
      font-size: 1rem;
      opacity: 0.75;
      letter-spacing: 2px;
    }

    .buttons {
      margin-top: 40px;
    }

    .button-link {
      text-decoration: none;
      color: #f5f5f5;
      border: 1px solid rgba(255,255,255,0.6);
      padding: 8px 18px;
      margin: 0 8px;
      display: inline-block;
      letter-spacing: 2px;
      font-size: 0.9rem;
      opacity: 0.85;
      transition: 0.3s;
    }

    .button-link:hover {
      background: rgba(255,255,255,0.1);
      color: #e8d8a0;
      border-color: #e8d8a0;
    }

    .playlists {
      padding: 100px 20px;
      text-align: center;
      background: rgba(0,0,0,0.9);
      position: relative;
      z-index: 1;
    }

    .playlists h2,
    .featured h2,
    .links h2 {
      margin-bottom: 40px;
      letter-spacing: 3px;
      color: #e8d8a0;
      font-size: 1rem;
    }

    .playlist {
      max-width: 600px;
      margin: 0 auto 20px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.03);
      transition: 0.3s;
    }

    .playlist:hover {
      border-color: #e8d8a0;
      transform: translateY(-2px);
    }

    .playlist a {
      text-decoration: none;
      color: #f5f5f5;
      letter-spacing: 2px;
    }

    .playlist a:hover {
      color: #e8d8a0;
    }

    .featured {
      padding: 100px 20px;
      text-align: center;
      background: black;
      position: relative;
      z-index: 1;
    }

    .release-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 320px));
      justify-content: center;
      gap: 30px;
      max-width: 900px;
      margin: 0 auto;
    }

    .release-card {
      text-decoration: none;
      color: #f5f5f5;
      display: block;
      transition: 0.3s;
    }

    .release-card:hover {
      transform: translateY(-4px);
    }

    .release-cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.03);
      margin-bottom: 14px;
    }

    .release-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: 0.4s;
    }

    .release-card:hover .release-cover {
      border-color: rgba(232,216,160,0.5);
    }

    .release-card:hover .release-cover img {
      transform: scale(1.02);
    }

    .release-title {
      font-size: 0.95rem;
      letter-spacing: 2px;
      opacity: 0.85;
    }

    .release-card:hover .release-title {
      color: #e8d8a0;
    }

    .bio {
      padding: 100px 20px;
      text-align: center;
      background: black;
    }

    .bio p {
      font-size: 0.9rem;
      letter-spacing: 2px;
      opacity: 0.7;
      line-height: 1.8;
    }

    .links {
      padding: 80px 20px 120px;
      text-align: center;
      background: black;
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .link-list a {
      text-decoration: none;
      color: #f5f5f5;
      letter-spacing: 2px;
      opacity: 0.8;
      transition: 0.3s;
    }

    .link-list a:hover {
      color: #e8d8a0;
    }

    @media (max-width: 700px) {
      h1 {
        font-size: 3.5rem;
      }

      .release-grid {
        grid-template-columns: 1fr;
        max-width: 320px;
      }
    }
  </style>
</head>

<body>

  <video class="bg-video" autoplay muted loop playsinline>
    <source src="hero.mp4" type="video/mp4">
  </video>

  <video class="grain" autoplay muted loop playsinline>
    <source src="grain.mp4" type="video/mp4">
  </video>

  <div class="overlay"></div>

  <section class="hero">
    <div class="content">
      <h1>MADE IN M</h1>
      <p>beats</p>

      <div class="buttons">
        <a class="button-link" href="#playlists">LISTEN →</a>
        <a class="button-link" href="https://made-in-m-digitalluc.sellfy.store/p/drum-essentials/" target="_blank">DRUMKIT →</a>
      </div>
    </div>
  </section>

  <section class="playlists" id="playlists">
    <h2>PLAYLISTS</h2>

    <div class="playlist">
      <a href="https://open.spotify.com/playlist/37i9dQZF1DZ06evO3d1tc3" target="_blank">
        THIS IS MADE IN M →
      </a>
    </div>

    <div class="playlist">
      <a href="https://open.spotify.com/playlist/2DOrjASr7kmWTumw2jOX0G?si=xKzdWitFSruMYBVJv9d1tg" target="_blank">
        BEATS CHINGONES →
      </a>
    </div>
  </section>

  <section class="featured">
    <h2>RECENT RELEASES</h2>

    <div class="release-grid">
      <a class="release-card" href="https://open.spotify.com/intl-de/album/4eJsXtiVnMUKUMoapDqOUr?si=uWaGAU-tTleBJ7pX8CsvBw" target="_blank">
        <div class="release-cover">
          <img src="snowing.png">
        </div>
        <div class="release-title">Snowing</div>
      </a>

      <a class="release-card" href="https://madeinm.bandcamp.com/track/bifurca" target="_blank">
        <div class="release-cover">
          <img src="bifurca.png">
        </div>
        <div class="release-title">bifurca</div>
      </a>
    </div>
  </section>

  <section class="bio">
    <p>
      Madrid / Berlin<br>
      dust / tape / groove
    </p>
  </section>

  <section class="links">
    <h2>LINKS</h2>

    <div class="link-list">
  <a href="https://open.spotify.com/intl-de/artist/5schXx0Ys4N52iU7On2j4c" target="_blank">SPOTIFY →</a>
  <a href="https://soundcloud.com/madeinm" target="_blank">SOUNDCLOUD →</a>
  <a href="https://madeinm.bandcamp.com/" target="_blank">BANDCAMP →</a>
  <a href="https://www.instagram.com/made.in.m/?hl=de" target="_blank">INSTAGRAM →</a>
</div>
  </section>

</body>
</html>
